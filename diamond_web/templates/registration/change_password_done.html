{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <div class="page-header-left d-flex align-items-center">
        <div class="page-header-title">
            <h5 class="m-b-10"><i class="feather-check-circle me-2"></i>Password Changed</h5>
        </div>
        <ul class="breadcrumb">
            <li class="breadcrumb-item"><a href="{% url 'home' %}">Home</a></li>
            <li class="breadcrumb-item active">Password Changed</li>
        </ul>
    </div>
    <div class="page-header-right ms-auto d-flex d-lg-none">
        <a href="javascript:void(0)" class="text-dark">
            <i class="feather-menu"></i>
        </a>
    </div>
</div>

<div class="main-content">
    <div class="card stretch stretch-full h-100">
        <div class="card-header">
            <h5 class="card-title mb-0"><i class="feather-check me-2"></i>Success</h5>
        </div>
        <div class="card-body">
            <div class="alert alert-success" role="alert">
                <h5 class="alert-heading">Ubah Password Sukses!</h5>
                <p class="mb-0">Password sudah di-update. Sekarang Anda bisa menggunakan password baru untuk masuk.</p>
            </div>
            <div class="mt-3">
                <a href="{% url 'home' %}" class="btn btn-primary">Kembali ke Home</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
