{% extends "base.html" %}
{% load crispy_forms_tags %}


{% block content %}
<div class="page-header">
        <div class="page-header-left d-flex align-items-center">
            <div class="page-header-title">
                <h5 class="m-b-10">
                    <i class="feather-calendar me-2"></i>Periode Pengiriman
                </h5>
            </div>
            <ul class="breadcrumb">
                <li class="breadcrumb-item"><a href="{% url 'home' %}">Home</a></li>
                <li class="breadcrumb-item"><a href="javascript:void(0);">Admin P3DE</a></li>
                <li class="breadcrumb-item active">Periode Pengiriman</li>
            </ul>
        </div>
        <div class="page-header-right ms-auto">
            <div class="page-header-right-items">
                <div class="d-flex d-md-none">
                    <a href="javascript:void(0)" class="page-header-right-close-toggle">
                        <i class="feather-arrow-left me-2"></i>
                        <span>Kembali</span>
                    </a>
                </div>
            </div>
            <div class="d-md-none d-flex align-items-center">
                <a href="javascript:void(0)" class="page-header-right-open-toggle">
                    <i class="feather-align-right fs-20"></i>
                </a>
            </div>
        </div>
    </div>

    <div class="main-content">
    <div class="card stretch stretch-full h-100">
        <div class="card-header">
            <h5 class="card-title mb-0"><i class="feather-calendar me-2"></i>Daftar Periode Pengiriman</h5>
            <button type="button" class="btn btn-success" data-action="create"><i class="feather-plus me-1"></i>Tambah</button>
        </div>
        <div class="card-body custom-card-action p-0">
            <div class="table-responsive">
            <table id="periode-table" class="table table-hover mb-0" style="width:100%">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Periode Penyampaian</th>
                        <th>Periode Penerimaan</th>
                        <th>Actions</th>
                    </tr>
                    <tr id="column-search-row">
                        <th><input type="text" class="form-control form-control-sm" placeholder="Cari ID" data-column="0" /></th>
                        <th><input type="text" class="form-control form-control-sm" placeholder="Cari Periode Penyampaian" data-column="1" /></th>
                        <th><input type="text" class="form-control form-control-sm" placeholder="Cari Periode Penerimaan" data-column="2" /></th>
                        <th></th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            </div>
        </div>
    </div>

    <!-- Modal for Create/Edit/Delete -->
    <div class="modal fade" id="crudModal" tabindex="-1" aria-labelledby="crudModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="crudModalLabel">Form</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="modalBody">
                    <!-- Content will be loaded here -->
                </div>
            </div>
        </div>
    </div>
    </div>

{% endblock %}
{% block scripts %}
<script>
    (function () {
        const ajaxUrl = "{% url 'periode_pengiriman_data' %}";
        let table;

        $(document).ready(function () {
            table = $('#periode-table').DataTable({
                serverSide: true,
                layout: {
                    topStart: null,
                    topEnd: null
                },
                ajax: {
                    url: ajaxUrl,
                    dataSrc: 'data',
                    data: function (d) {
                        // Add column search values
                        d.columns_search = [];
                        $('#column-search-row input').each(function (i) {
                            d.columns_search[i] = $(this).val();
                        });
                        return d;
                    }
                },
                pageLength: 10,
                columns: [
                    { data: 'id' },
                    { data: 'periode_penyampaian' },
                    { data: 'periode_penerimaan' },
                    { data: 'actions', orderable: false, searchable: false }
                ],
                columnDefs: [
                    { targets: 3, render: function (data, type, row, meta) { return data; } }
                ],
                order: [[0, 'asc']]
            });

            // Add individual column search
            $('#column-search-row input').on('keyup change', function () {
                table.ajax.reload();
            });

            // Handle modal hide to prevent aria-hidden conflicts
            const modalElement = document.getElementById('crudModal');
            modalElement.addEventListener('hidden.bs.modal', function () {
                // Reset modal body
                document.getElementById('modalBody').innerHTML = '';
            });

            modalElement.addEventListener('hide.bs.modal', function () {
                // Clear focus from form elements
                const focusedElement = document.activeElement;
                if (focusedElement && modalElement.contains(focusedElement)) {
                    focusedElement.blur();
                }
            });            // Handle create button
            $('[data-action="create"]').on('click', function () {
                loadModal('{% url "periode_pengiriman_create" %}', 'Tambah Periode Pengiriman');
            });

            // Handle edit/delete buttons (delegated event)
            $(document).on('click', '[data-action="edit"]', function (e) {
                e.preventDefault();
                const url = $(this).data('url');
                loadModal(url, 'Edit Periode Pengiriman');
            });

            $(document).on('click', '[data-action="delete"]', function (e) {
                e.preventDefault();
                const url = $(this).data('url');
                loadModal(url, 'Hapus Periode Pengiriman');
            });

            // Handle form submission
            $(document).on('submit', '#modalBody form', function (e) {
                e.preventDefault();
                const form = $(this);
                const url = form.attr('action');
                const formData = new FormData(form[0]);

                $.ajax({
                    url: url,
                    type: 'POST',
                    data: formData,
                    processData: false,
                    contentType: false,
                    success: function (response) {
                        if (response.success) {
                            $('#crudModal').modal('hide');
                            table.ajax.reload();
                            showToast(response.message || 'Data berhasil disimpan.', 'success');
                        } else {
                            $('#modalBody').html(response.html);
                        }
                    },
                    error: function (xhr) {
                        try {
                            const response = JSON.parse(xhr.responseText);
                            if (response.message) {
                                showToast(response.message, 'danger');
                            } else {
                                showToast('Terjadi kesalahan. Silakan coba lagi.', 'danger');
                            }
                        } catch (e) {
                            showToast('Terjadi kesalahan. Silakan coba lagi.', 'danger');
                        }
                    }
                });
            });        });

        function loadModal(url, title) {
            $('#crudModalLabel').text(title);
            $('#modalBody').html('<div class="text-center"><div class="spinner-border" role="status"></div></div>');
            $('#crudModal').modal('show');

            $.ajax({
                url: url,
                type: 'GET',
                data: { ajax: '1' },
                success: function (response) {
                    $('#modalBody').html(response.html || response);
                },
                error: function () {
                    $('#modalBody').html('<div class="alert alert-danger">Gagal memuat form.</div>');
                }
            });
        }

    })();
</script>
{% endblock %}
