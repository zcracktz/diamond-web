{% block content %}

                        <div class="mb-2">

                            <select class="form-select form-select-sm" id="filter-pic-p3de" name="pic_p3de" data-select2-selector="default" multiple="multiple">
                                <option value="">-- Semua --</option>
                            </select>
                        </div>
                        <div class="mb-2">
                            <label for="filter-pic-pide" class="form-label">PIC PIDE</label>
                            <select class="form-select form-select-sm" id="filter-pic-pide" name="pic_pide" data-select2-selector="default" multiple="multiple">
                                <option value="">-- Semua --</option>
                            </select>
                        </div>
                        <div class="mb-2">
                            <label for="filter-pic-pmde" class="form-label">PIC PMDE</label>
                            <select class="form-select form-select-sm" id="filter-pic-pmde" name="pic_pmde" data-select2-selector="default" multiple="multiple">

                    </div>
                    <div class="col-md-4">

                            <select class="form-select form-select-sm" id="filter-kategori-ilap" name="kategori_ilap" data-select2-selector="default" multiple="multiple">
                                <option value="">-- Semua --</option>
                            </select>
                        </div>
                        <div class="mb-2">
                            <label for="filter-ilap" class="form-label">ILAP</label>
                            <select class="form-select form-select-sm" id="filter-ilap" name="ilap" data-select2-selector="default" multiple="multiple">
                                <option value="">-- Semua --</option>

                        </div>
                        <div class="mb-2">
                            <label for="filter-jenis-data" class="form-label">Jenis Data</label>
                            <select class="form-select form-select-sm" id="filter-jenis-data" name="jenis_data" data-select2-selector="default" multiple="multiple">
                                <option value="">-- Semua --</option>

                        <div class="mb-2">
                            <label for="filter-sub-jenis-data" class="form-label">Sub Jenis Data</label>
                            <select class="form-select form-select-sm" id="filter-sub-jenis-data" name="sub_jenis_data" data-select2-selector="default" multiple="multiple">

                        <div class="mb-2">
                            <label for="filter-kanwil" class="form-label">Kanwil</label>
                            <select class="form-select form-select-sm" id="filter-kanwil" name="kanwil" data-select2-selector="default" multiple="multiple">
                                <option value="">-- Semua --</option>
                            </select>

                        <div class="mb-2">
                            <label for="filter-kpp" class="form-label">KPP</label>
                            <select class="form-select form-select-sm" id="filter-kpp" name="kpp" data-select2-selector="default" multiple="multiple">

                            <label for="filter-dasar-hukum" class="form-label">Dasar Hukum</label>
                            <select class="form-select form-select-sm" id="filter-dasar-hukum" name="dasar_hukum" data-select2-selector="default" multiple="multiple">

                            <label for="filter-periode-pengiriman" class="form-label">Periode Pengiriman</label>
                            <select class="form-select form-select-sm" id="filter-periode-pengiriman" name="periode_pengiriman" data-select2-selector="default" multiple="multiple">
                                <option value="">-- Semua --</option>
                            </select>
                        </div>
                        <div class="mb-2">
                            <label for="filter-periode-penerimaan" class="form-label">Periode Penerimaan</label>

    <!-- Table card -->
    <div class="card">
        <div class="card-header d-flex align-items-center">
            <h5 class="card-title mb-0"><i class="feather-list me-2"></i>Daftar Tiket</h5>
        </div>
        <div class="card-body custom-card-action p-0">
            <div class="table-responsive">
                <table id="tiket-table" class="table table-hover mb-0" style="width:100%">

    </div>

{% endblock %}
{% block scripts %}
<script>
    (function () {
        const ajaxUrl = "{% url 'tiket_data' %}";
        const urlParams = new URLSearchParams(window.location.search);
        let table;
        let initialFiltersApplied = false;

        // Helper: get comma-separated string from multi-select (or empty string if none selected)
        function getMultiSelectValue(selector) {
            const val = $(selector).val();
            return (val && val.length > 0) ? val.join(',') : '';
        }

        function normalizePeriodeParam() {
            const periodeValue = (urlParams.get('periode') || '').trim();
            if (!periodeValue) return '';

            const normalizedPenerimaan = (urlParams.get('periode_penerimaan') || '').trim().toLowerCase();
            const map = {
                'bulanan': 'bulanan',
                'triwulanan': 'triwulanan',
                'semester': 'semester',
                'tahunan': 'tahunan'
            };

            if (/^\d+$/.test(periodeValue) && map[normalizedPenerimaan]) {
                return `${map[normalizedPenerimaan]}:${periodeValue}`;
            }

            return periodeValue;
        }

        function applyInitialFiltersFromUrl() {
            const paramToSelectMap = {
                nomor_tiket: '#filter-nomor-tiket',
                tahun: '#filter-tahun',
                pic_p3de: '#filter-pic-p3de',
                pic_pide: '#filter-pic-pide',
                pic_pmde: '#filter-pic-pmde',
                kategori_ilap: '#filter-kategori-ilap',
                ilap: '#filter-ilap',
                jenis_data: '#filter-jenis-data',
                sub_jenis_data: '#filter-sub-jenis-data',
                kanwil: '#filter-kanwil',
                kpp: '#filter-kpp',
                kategori_wilayah: '#filter-kategori-wilayah',
                jenis_tabel: '#filter-jenis-tabel',
                dasar_hukum: '#filter-dasar-hukum',
                periode_pengiriman: '#filter-periode-pengiriman',
                periode_penerimaan: '#filter-periode-penerimaan',
                status: '#filter-status'
            };

            let hasInitialFilter = false;

            Object.entries(paramToSelectMap).forEach(([param, selector]) => {
                const raw = (urlParams.get(param) || '').trim();
                if (!raw) return;
                // Support comma-separated values in URL params
                const values = raw.split(',').map(function(v) { return v.trim(); }).filter(function(v) { return v; });
                if (values.length === 0) return;
                hasInitialFilter = true;

                const $select = $(selector);
                values.forEach(function(v) {
                    if ($select.find('option[value="' + v + '"]').length === 0) {
                        $select.append('<option value="' + v + '">' + v + '</option>');
                    }
                });
                $select.val(values).trigger('change');
            });

            const periodeValue = normalizePeriodeParam();
            if (periodeValue) {
                hasInitialFilter = true;
                const $periode = $('#filter-periode');
                const pValues = periodeValue.split(',').map(function(v) { return v.trim(); }).filter(function(v) { return v; });
                pValues.forEach(function(v) {
                    if ($periode.find('option[value="' + v + '"]').length === 0) {
                        $periode.append('<option value="' + v + '">' + v + '</option>');
                    }
                });
                $periode.val(pValues).trigger('change');
            }

            return hasInitialFilter;
        }

        function getCurrentFilterValues() {
            return {
                nomor_tiket: getMultiSelectValue('#filter-nomor-tiket'),
                tahun: getMultiSelectValue('#filter-tahun'),
                periode: getMultiSelectValue('#filter-periode'),
                pic_p3de: getMultiSelectValue('#filter-pic-p3de'),
                pic_pide: getMultiSelectValue('#filter-pic-pide'),
                pic_pmde: getMultiSelectValue('#filter-pic-pmde'),
                kategori_ilap: getMultiSelectValue('#filter-kategori-ilap'),
                ilap: getMultiSelectValue('#filter-ilap'),
                jenis_data: getMultiSelectValue('#filter-jenis-data'),
                sub_jenis_data: getMultiSelectValue('#filter-sub-jenis-data'),
                kanwil: getMultiSelectValue('#filter-kanwil'),
                kpp: getMultiSelectValue('#filter-kpp'),
                kategori_wilayah: getMultiSelectValue('#filter-kategori-wilayah'),
                jenis_tabel: getMultiSelectValue('#filter-jenis-tabel'),
                dasar_hukum: getMultiSelectValue('#filter-dasar-hukum'),
                periode_pengiriman: getMultiSelectValue('#filter-periode-pengiriman'),
                periode_penerimaan: getMultiSelectValue('#filter-periode-penerimaan'),
                status: getMultiSelectValue('#filter-status')
            };
        }

        function initSelect2() {
            if (typeof $.fn.select2 !== 'function') return;
            $('#filter-form select').each(function () {
                if (!$(this).hasClass('select2-hidden-accessible')) {
                    $(this).select2({
                        theme: 'bootstrap-5',
                        closeOnSelect: false,
                        placeholder: '-- Pilih --',
                        allowClear: true
                    });
                }
            });
        }

        function updateDynamicDropdowns() {
            const filters = getCurrentFilterValues();
            
            $.ajax({
                url: ajaxUrl,
                type: 'GET',
                data: Object.assign({ get_filter_options: '1' }, filters),
                success: function (response) {
                    if (!response.filter_options) return;
                    const opts = response.filter_options;

                    // Store currently selected values
                    const selectedValues = {};
                    const dropdownMap = {
                        'nomor_tiket': '#filter-nomor-tiket',
                        'tahun': '#filter-tahun',
                        'periode': '#filter-periode',
                        'pic_p3de': '#filter-pic-p3de',
                        'pic_pide': '#filter-pic-pide',
                        'pic_pmde': '#filter-pic-pmde',
                        'kategori_ilap': '#filter-kategori-ilap',
                        'ilap': '#filter-ilap',
                        'jenis_data': '#filter-jenis-data',
                        'sub_jenis_data': '#filter-sub-jenis-data',
                        'kanwil': '#filter-kanwil',
                        'kpp': '#filter-kpp',
                        'kategori_wilayah': '#filter-kategori-wilayah',
                        'jenis_tabel': '#filter-jenis-tabel',
                        'dasar_hukum': '#filter-dasar-hukum',
                        'periode_pengiriman': '#filter-periode-pengiriman',
                        'periode_penerimaan': '#filter-periode-penerimaan',
                        'status': '#filter-status'
                    };

                    Object.entries(dropdownMap).forEach(([key, selector]) => {
                        selectedValues[selector] = $(selector).val();
                    });

                    // Update dropdowns (keep selected values if still valid, preserve periode separately)
                    const updateDropdown = function(optKey, selector, keepSelected = true) {
                        if (!opts[optKey]) return;
                        
                        const $select = $(selector);
                        const oldValues = selectedValues[selector] || [];
                        const oldArray = Array.isArray(oldValues) ? oldValues : (oldValues ? [oldValues] : []);
                        
                        // Destroy Select2 instance before modifying options
                        if (typeof $.fn.select2 === 'function' && $select.hasClass('select2-hidden-accessible')) {
                            $select.select2('destroy');
                        }
                        
                        // Remove all options except first one
                        $select.find('option:not(:first)').remove();
                        
                        // Add new options
                        opts[optKey].forEach(item => {
                            $select.append(`<option value="${item.id}">${item.name}</option>`);
                        });
                        
                        // Restore values if they still exist, otherwise clear
                        if (keepSelected && oldArray.length > 0) {
                            const validValues = oldArray.filter(function(v) {
                                return $select.find('option[value="' + v + '"]').length > 0;
                            });
                            if (validValues.length > 0) {
                                $select.val(validValues);
                            } else if (selector !== '#filter-tahun' && selector !== '#filter-kategori-ilap' && 
                                       selector !== '#filter-ilap' && selector !== '#filter-jenis-data') {
                                // Only clear dependent dropdowns, not main filter
                                $select.val([]);
                            }
                        } else {
                            $select.val([]);
                        }
                        
                        // Re-initialize Select2
                        if (typeof $.fn.select2 === 'function') {
                            $select.select2({ theme: 'bootstrap-5' });
                        }
                    };

                    // Update all dropdowns dynamically
                    updateDropdown('nomor_tiket', '#filter-nomor-tiket');
                    updateDropdown('tahun', '#filter-tahun');
                    updateDropdown('periode', '#filter-periode');
                    updateDropdown('pic_p3de', '#filter-pic-p3de');
                    updateDropdown('pic_pide', '#filter-pic-pide');
                    updateDropdown('pic_pmde', '#filter-pic-pmde');
                    updateDropdown('kategori_ilap', '#filter-kategori-ilap');
                    updateDropdown('ilap', '#filter-ilap');
                    updateDropdown('jenis_data', '#filter-jenis-data');
                    updateDropdown('sub_jenis_data', '#filter-sub-jenis-data');
                    updateDropdown('kanwil', '#filter-kanwil');
                    updateDropdown('kpp', '#filter-kpp');
                    updateDropdown('kategori_wilayah', '#filter-kategori-wilayah');
                    updateDropdown('jenis_tabel', '#filter-jenis-tabel');
                    updateDropdown('dasar_hukum', '#filter-dasar-hukum');
                    updateDropdown('periode_pengiriman', '#filter-periode-pengiriman');
                    updateDropdown('periode_penerimaan', '#filter-periode-penerimaan');
                    updateDropdown('status', '#filter-status');
                },
                error: function () {
                    // Ensure Select2 is initialized even if AJAX fails
                    initSelect2();
                }
            });
        }

        $(document).ready(function () {
            // Ensure Select2 is initialized on all filter selects (select2-active.min.js
            // may not have run if jQuery wasn't ready yet)
            initSelect2();

            table = $('#tiket-table').DataTable({
                serverSide: true,
                searching: false,
                layout: {
                    topStart: null,
                    topEnd: null
                },
                ajax: {
                    url: ajaxUrl,
                    dataSrc: 'data',
                    data: function (d) {
                        d.nomor_tiket = getMultiSelectValue('#filter-nomor-tiket');
                        d.tahun = getMultiSelectValue('#filter-tahun');
                        d.periode = getMultiSelectValue('#filter-periode');
                        d.pic_p3de = getMultiSelectValue('#filter-pic-p3de');
                        d.pic_pide = getMultiSelectValue('#filter-pic-pide');
                        d.pic_pmde = getMultiSelectValue('#filter-pic-pmde');
                        d.kategori_ilap = getMultiSelectValue('#filter-kategori-ilap');
                        d.ilap = getMultiSelectValue('#filter-ilap');
                        d.jenis_data = getMultiSelectValue('#filter-jenis-data');
                        d.sub_jenis_data = getMultiSelectValue('#filter-sub-jenis-data');
                        d.kanwil = getMultiSelectValue('#filter-kanwil');
                        d.kpp = getMultiSelectValue('#filter-kpp');
                        d.kategori_wilayah = getMultiSelectValue('#filter-kategori-wilayah');
                        d.jenis_tabel = getMultiSelectValue('#filter-jenis-tabel');
                        d.dasar_hukum = getMultiSelectValue('#filter-dasar-hukum');
                        d.periode_pengiriman = getMultiSelectValue('#filter-periode-pengiriman');
                        d.periode_penerimaan = getMultiSelectValue('#filter-periode-penerimaan');
                        d.status = getMultiSelectValue('#filter-status');
                        return d;
                    }
                },
                pageLength: 10,
                columns: [
                    { data: 'id' },
                    { data: 'nomor_tiket' },
                    {
                        data: null,
                        render: function(data, type, row) {
                            return '<span class="text-muted small">' + (row.kode_ilap || '-') + '</span><br>' + (row.nama_ilap || '-');
                        }
                    },
                    {
                        data: null,
                        render: function(data, type, row) {
                            return '<span class="text-muted small">' + (row.id_sub_jenis_data || '-') + '</span><br>' + (row.nama_sub_jenis_data || '-');
                        }
                    },
                    { data: 'periode_formatted' },
                    { data: 'status' },
                    { data: 'actions', orderable: false, searchable: false }
                ],
                columnDefs: [
                    { targets: 0, visible: false, searchable: false },
                    { targets: 6, render: function (data, type, row, meta) { return data; } }
                ],
                order: [[0, 'asc']]
            });

            // Filter dropdowns — dynamic, reload on change
            $('#filter-form select').on('change', function () {
                // Update dropdown options dynamically based on filter selections
                updateDynamicDropdowns();
                // Reload table with new filters
                table.ajax.reload();
            });

            // Reset button — clear form then reload
            $('#btn-reset-filter').on('click', function () {
                // Destroy Select2 on all filter selects before reset
                if (typeof $.fn.select2 === 'function') {
                    $('#filter-form select').each(function () {
                        if ($(this).hasClass('select2-hidden-accessible')) {
                            $(this).select2('destroy');
                        }
                    });
                }
                $('#filter-form')[0].reset();
                // For multi-select, explicitly set empty array on each select
                $('#filter-form select').val([]);
                // Re-initialize Select2 after reset and reload table
                initSelect2();
                updateDynamicDropdowns();
                table.ajax.reload();
            });

            // Load filter dropdown options on page load
            loadFilterOptions();
        });

        function loadFilterOptions() {
            $.ajax({
                url: ajaxUrl,
                type: 'GET',
                data: { get_filter_options: '1' },
                success: function (response) {
                    if (!response.filter_options) return;
                    const opts = response.filter_options;

                    // Destroy Select2 on all filter selects before modifying options
                    if (typeof $.fn.select2 === 'function') {
                        $('#filter-form select').each(function () {
                            if ($(this).hasClass('select2-hidden-accessible')) {
                                $(this).select2('destroy');
                            }
                        });
                    }

                    if (opts.nomor_tiket) opts.nomor_tiket.forEach(item => $('#filter-nomor-tiket').append(`<option value="${item.id}">${item.name}</option>`));
                    if (opts.tahun) opts.tahun.forEach(item => $('#filter-tahun').append(`<option value="${item.id}">${item.name}</option>`));
                    if (opts.periode) opts.periode.forEach(item => $('#filter-periode').append(`<option value="${item.id}">${item.name}</option>`));
                    if (opts.pic_p3de) opts.pic_p3de.forEach(item => $('#filter-pic-p3de').append(`<option value="${item.id}">${item.name}</option>`));
                    if (opts.pic_pide) opts.pic_pide.forEach(item => $('#filter-pic-pide').append(`<option value="${item.id}">${item.name}</option>`));
                    if (opts.pic_pmde) opts.pic_pmde.forEach(item => $('#filter-pic-pmde').append(`<option value="${item.id}">${item.name}</option>`));
                    if (opts.kategori_ilap) opts.kategori_ilap.forEach(item => $('#filter-kategori-ilap').append(`<option value="${item.id}">${item.name}</option>`));
                    if (opts.ilap) opts.ilap.forEach(item => $('#filter-ilap').append(`<option value="${item.id}">${item.name}</option>`));
                    if (opts.jenis_data) opts.jenis_data.forEach(item => $('#filter-jenis-data').append(`<option value="${item.id}">${item.name}</option>`));
                    if (opts.sub_jenis_data) opts.sub_jenis_data.forEach(item => $('#filter-sub-jenis-data').append(`<option value="${item.id}">${item.name}</option>`));
                    if (opts.kanwil) opts.kanwil.forEach(item => $('#filter-kanwil').append(`<option value="${item.id}">${item.name}</option>`));
                    if (opts.kpp) opts.kpp.forEach(item => $('#filter-kpp').append(`<option value="${item.id}">${item.name}</option>`));
                    if (opts.kategori_wilayah) opts.kategori_wilayah.forEach(item => $('#filter-kategori-wilayah').append(`<option value="${item.id}">${item.name}</option>`));
                    if (opts.jenis_tabel) opts.jenis_tabel.forEach(item => $('#filter-jenis-tabel').append(`<option value="${item.id}">${item.name}</option>`));
                    if (opts.dasar_hukum) opts.dasar_hukum.forEach(item => $('#filter-dasar-hukum').append(`<option value="${item.id}">${item.name}</option>`));
                    if (opts.periode_pengiriman) opts.periode_pengiriman.forEach(item => $('#filter-periode-pengiriman').append(`<option value="${item.id}">${item.name}</option>`));
                    if (opts.periode_penerimaan) opts.periode_penerimaan.forEach(item => $('#filter-periode-penerimaan').append(`<option value="${item.id}">${item.name}</option>`));
                    if (opts.status) opts.status.forEach(item => $('#filter-status').append(`<option value="${item.id}">${item.name}</option>`));

                    // Re-initialize Select2 on all filter selects
                    if (typeof $.fn.select2 === 'function') {
                        $('#filter-form select').each(function () {
                            $(this).select2({
                                theme: 'bootstrap-5',
                                closeOnSelect: false,
                                placeholder: '-- Pilih --',
                                allowClear: true
                            });
                        });
                    }

                    if (!initialFiltersApplied) {
                        initialFiltersApplied = true;
                        if (applyInitialFiltersFromUrl()) {
                            updateDynamicDropdowns();
                            table.ajax.reload();
                        }
                    }
                },
                error: function () {
                    // Ensure Select2 is initialized even if AJAX fails
                    initSelect2();
                    if (!initialFiltersApplied) {
                        initialFiltersApplied = true;
                        if (applyInitialFiltersFromUrl()) {
                            table.ajax.reload();
                        }
                    }
                }
            });
        }
    })();
</script>
{% endblock %}
