{% extends "base.html" %}
{% load crispy_forms_tags %}


{% block content %}
<div class="page-header">
        <div class="page-header-left d-flex align-items-center">
            <div class="page-header-title">
                <h5 class="m-b-10">
                    <i class="feather-archive me-2"></i>Tanda Terima Data
                </h5>
            </div>
            <ul class="breadcrumb">
                <li class="breadcrumb-item"><a href="{% url 'home' %}">Home</a></li>
                <li class="breadcrumb-item"><a href="javascript:void(0);">P3DE</a></li>
                <li class="breadcrumb-item active">Kelola Tanda Terima Data</li>
            </ul>
        </div>
        <div class="page-header-right ms-auto">
            <div class="page-header-right-items">
                <div class="d-flex d-md-none">
                    <a href="javascript:void(0)" class="page-header-right-close-toggle">
                        <i class="feather-arrow-left me-2"></i>
                        <span>Back</span>
                    </a>
                </div>
            </div>
            <div class="d-md-none d-flex align-items-center">
                <a href="javascript:void(0)" class="page-header-right-open-toggle">
                    <i class="feather-align-right fs-20"></i>
                </a>
            </div>
        </div>
    </div>

    <div class="main-content">
    <div class="card stretch stretch-full h-100">
        <div class="card-header">
            <h5 class="card-title mb-0"><i class="feather-archive me-2"></i>Daftar Tanda Terima Data</h5>
            <button type="button" class="btn btn-success" data-action="create"><i class="feather-plus me-1"></i>Tambah</button>
        </div>
        <div class="card-body custom-card-action p-0">
            <div class="table-responsive">
            <table id="tanda-terima-data-table" class="table table-hover mb-0" style="width:100%">
                <thead>
                    <tr>
                        <th class="d-none">ID</th>
                        <th>Nomor Tanda Terima</th>
                        <th>Tanggal</th>
                        <th>ILAP</th>
                        <th>Jenis Data</th>
                        <th>Perekam</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                    <tr id="column-search-row">
                        <th class="d-none"></th>
                        <th><input type="text" class="form-control form-control-sm" placeholder="Search Nomor" data-column="0" /></th>
                        <th><input type="text" class="form-control form-control-sm" placeholder="Search Tanggal" data-column="1" /></th>
                        <th><input type="text" class="form-control form-control-sm" placeholder="Search ILAP" data-column="2" /></th>
                        <th><input type="text" class="form-control form-control-sm" placeholder="Search Jenis" data-column="3" /></th>
                        <th><input type="text" class="form-control form-control-sm" placeholder="Search Perekam" data-column="4" /></th>
                        <th><input type="text" class="form-control form-control-sm" placeholder="Search Status" data-column="5" /></th>
                        <th></th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            </div>
        </div>
    </div>

    <!-- Modal for Create/Edit/Batalkan -->
    <div class="modal fade" id="crudModal" tabindex="-1" aria-labelledby="crudModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="crudModalLabel">Form</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="modalBody">
                    <!-- Content will be loaded here -->
                </div>
            </div>
        </div>
    </div>
    </div>

{% endblock %}
{% block scripts %}
<script>
    (function () {
        const ajaxUrl = "{% url 'tanda_terima_data_data' %}";
        let table;

        $(document).ready(function () {
            table = $('#tanda-terima-data-table').DataTable({
                serverSide: true,
                searching: false,
                layout: {
                    topStart: null,
                    topEnd: null
                },
                ajax: {
                    url: ajaxUrl,
                    dataSrc: 'data',
                    data: function (d) {
                        // Add column search values
                        d.columns_search = [];
                        $('#column-search-row input').each(function (i) {
                            d.columns_search[i] = $(this).val();
                        });
                        return d;
                    }
                },
                pageLength: 10,
                columns: [
                    { data: 'id' },
                    { data: 'nomor_tanda_terima' },
                    { data: 'tanggal_tanda_terima' },
                    { data: 'id_ilap' },
                    { data: 'jenis_data' },
                    { data: 'id_perekam' },
                    { data: 'status' },
                    { data: 'actions', orderable: false, searchable: false }
                ],
                columnDefs: [
                    { targets: 0, visible: false, searchable: false }
                ],
                order: [[0, 'asc']]
            });

            // Add individual column search
            $('#column-search-row input').on('keyup change', function () {
                table.ajax.reload();
            });

            // Handle modal hide to prevent aria-hidden conflicts
            const modalElement = document.getElementById('crudModal');
            modalElement.addEventListener('hidden.bs.modal', function () {
                // Reset modal body
                document.getElementById('modalBody').innerHTML = '';
            });

            modalElement.addEventListener('hide.bs.modal', function () {
                // Clear focus from form elements
                const focusedElement = document.activeElement;
                if (focusedElement && modalElement.contains(focusedElement)) {
                    focusedElement.blur();
                }
            });

            // Handle create button
            $('[data-action="create"]').on('click', function () {
                loadModal('{% url "tanda_terima_data_create" %}', 'Tambah Tanda Terima Data');
            });

            // Handle edit/batalkan buttons (delegated event)
            $(document).on('click', '[data-action="edit"]', function (e) {
                e.preventDefault();
                const url = $(this).data('url');
                loadModal(url, 'Edit Tanda Terima Data');
            });

            $(document).on('click', '[data-action="view"]', function (e) {
                e.preventDefault();
                const url = $(this).data('url');
                loadModal(url, 'Detail Tanda Terima Data');
            });

            $(document).on('click', '[data-action="delete"]', function (e) {
                e.preventDefault();
                const url = $(this).data('url');
                loadModal(url, 'Batalkan Tanda Terima Data');
            });


            // Handle form submission
            $(document).on('submit', '#modalBody form', function (e) {
                e.preventDefault();
                const form = $(this);
                const url = form.attr('action');
                const formData = new FormData(form[0]);

                // Add disabled fields to FormData (they're not included by default)
                // For checkbox groups, append values without deleting to preserve new selections
                form.find('input:disabled, select:disabled, textarea:disabled').each(function () {
                    const name = $(this).attr('name');
                    if (!name) {
                        return;
                    }

                    const $field = $(this);
                    const value = $field.val();

                    if ($field.is(':checkbox')) {
                        if (this.checked) {
                            formData.append(name, value);
                        }
                        return;
                    }

                    // Single-value fields: replace existing value
                    formData.delete(name);
                    formData.append(name, value);
                });

                $.ajax({
                    url: url,
                    type: 'POST',
                    data: formData,
                    processData: false,
                    contentType: false,
                    headers: {
                        'X-Requested-With': 'XMLHttpRequest'
                    },
                    success: function (response) {
                        if (response.success) {
                            $('#crudModal').modal('hide');
                            table.ajax.reload();
                            showToast(response.message || 'Data berhasil disimpan.', 'success');
                        } else {
                            $('#modalBody').html(response.html);
                        }
                    },
                    error: function (xhr) {
                        try {
                            const response = JSON.parse(xhr.responseText);
                            if (response.message) {
                                showToast(response.message, 'danger');
                            } else {
                                showToast('Terjadi kesalahan. Silakan coba lagi.', 'danger');
                            }
                        } catch (e) {
                            const message = xhr.responseText || 'Terjadi kesalahan. Silakan coba lagi.';
                            showToast(message, 'danger');
                        }
                    }
                });
            });
        });

        function loadModal(url, title) {
            $('#crudModalLabel').text(title);
            $('#modalBody').html('<div class="text-center"><div class="spinner-border" role="status"></div></div>');
            $('#crudModal').modal('show');

            $.ajax({
                url: url,
                type: 'GET',
                data: { ajax: '1' },
                success: function (response) {
                    $('#modalBody').html(response.html || response);
                    initTandaTerimaForm(document.getElementById('modalBody'));
                },
                error: function () {
                    $('#modalBody').html('<div class="alert alert-warning">Gagal memuat form.</div>');
                }
            });
        }

        function initTandaTerimaForm(container) {
            if (!container) {
                return;
            }
            const tanggalInput = container.querySelector('#id_tanggal_tanda_terima');
            const nomorInput = container.querySelector('#id_nomor_tanda_terima');
            const ilapInput = container.querySelector('#id_id_ilap');
            const tiketContainer = container.querySelector('#tiket-checkbox-container');

            if (tanggalInput && nomorInput) {
                const updateNomor = () => {
                    const tanggalValue = tanggalInput.value;
                    if (!tanggalValue) {
                        return;
                    }

                    fetch(`{% url "tanda_terima_next_number" %}?tanggal=${encodeURIComponent(tanggalValue)}`)
                        .then(response => response.json())
                        .then(data => {
                            if (data && data.success && data.nomor_tanda_terima) {
                                nomorInput.value = data.nomor_tanda_terima;
                            }
                        })
                        .catch(() => {
                            // ignore
                        });
                };

                tanggalInput.addEventListener('change', updateNomor);
            }

            if (ilapInput && tiketContainer) {
                const renderTikets = (items) => {
                    if (!items || items.length === 0) {
                        tiketContainer.innerHTML = '<div class="text-muted">Tidak ada tiket tersedia.</div>';
                        return;
                    }
                    tiketContainer.innerHTML = items.map((item) => {
                        const disabledAttr = item.disabled ? 'disabled' : '';
                        const checkedAttr = item.selected ? 'checked' : '';
                        return `
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="tiket_ids" value="${item.id}" id="tiket-${item.id}" ${checkedAttr} ${disabledAttr}>
                                <label class="form-check-label" for="tiket-${item.id}" ${item.disabled ? 'style="opacity: 0.6; cursor: not-allowed;"' : ''}>
                                    ${item.label}
                                </label>
                            </div>
                        `;
                    }).join('');
                };

                const loadTiketsByIlap = () => {
                    const ilapId = ilapInput.value;
                    if (!ilapId) {
                        tiketContainer.innerHTML = '<div class="text-muted">Pilih ILAP terlebih dahulu.</div>';
                        return;
                    }
                    // Get tanda_terima_id from form data attribute
                    const form = container.querySelector('form');
                    const tandaTerimaId = form && form.dataset.tandaTerimaId ? form.dataset.tandaTerimaId : '';
                    
                    const params = new URLSearchParams({
                        ilap_id: ilapId,
                        ...(tandaTerimaId && { tanda_terima_id: tandaTerimaId })
                    });
                    fetch(`{% url "tanda_terima_tikets_by_ilap" %}?${params}`)
                        .then(response => response.json())
                        .then(data => {
                            if (data && data.success) {
                                renderTikets(data.data || []);
                            }
                        })
                        .catch(err => {
                            // ignore
                        });
                };

                // For edit mode: if ILAP is disabled, load tikets on init
                if (ilapInput.disabled && ilapInput.value) {
                    loadTiketsByIlap();
                } else if (!ilapInput.disabled) {
                    // For create mode: listen to ILAP changes
                    ilapInput.addEventListener('change', loadTiketsByIlap);
                }
            }
        }
    })();

    // Download tanda terima document
    function downloadTandaTerimaDoc(pk, docType) {
        const a = document.createElement('a');
        a.href = `/tiket/${pk}/documents/download/?doc_type=${docType}`;
        a.style.display = 'none';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }
</script>
{% endblock %}
