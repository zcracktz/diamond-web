{% extends "base.html" %}
{% load crispy_forms_tags %}


{% block content %}
<div class="page-header">
        <div class="page-header-left d-flex align-items-center">
            <div class="page-header-title">
                <h5 class="m-b-10">
                    <i class="feather-grid me-2"></i>Nama Tabel
                </h5>
            </div>
            <ul class="breadcrumb">
                <li class="breadcrumb-item"><a href="{% url 'home' %}">Home</a></li>
                <li class="breadcrumb-item"><a href="javascript:void(0);">Admin PIDE</a></li>
                <li class="breadcrumb-item active">Nama Tabel</li>
            </ul>
        </div>
        <div class="page-header-right ms-auto">
            <div class="page-header-right-items">
                <div class="d-flex d-md-none">
                    <a href="javascript:void(0)" class="page-header-right-close-toggle">
                        <i class="feather-arrow-left me-2"></i>
                        <span>Kembali</span>
                    </a>
                </div>
            </div>
            <div class="d-md-none d-flex align-items-center">
                <a href="javascript:void(0)" class="page-header-right-open-toggle">
                    <i class="feather-align-right fs-20"></i>
                </a>
            </div>
        </div>
    </div>

    <div class="main-content">
    <div class="card stretch stretch-full h-100">
        <div class="card-header">
            <h5 class="card-title mb-0"><i class="feather-grid me-2"></i>Daftar Nama Tabel</h5>
            <button type="button" class="btn btn-success" data-action="create"><i class="feather-plus me-1"></i>Tambah</button>
        </div>
        <div class="card-body custom-card-action p-0">
            <div class="table-responsive">
            <table id="nama-tabel-table" class="table table-hover mb-0 table-compact" style="width:100%">
                <thead>
                    <tr>
                        <th>ID Sub Jenis Data</th>
                        <th>Nama Jenis Data</th>
                        <th>Nama Sub Jenis Data</th>
                        <th>Nama Tabel I</th>
                        <th>Nama Tabel U</th>
                        <th class="col-actions text-center">Aksi</th>
                    </tr>
                    <tr id="column-search-row">
                        <th><input type="text" class="form-control form-control-sm" placeholder="Cari" data-column="0" /></th>
                        <th><input type="text" class="form-control form-control-sm" placeholder="Cari" data-column="1" /></th>
                        <th><input type="text" class="form-control form-control-sm" placeholder="Cari" data-column="2" /></th>
                        <th><input type="text" class="form-control form-control-sm" placeholder="Cari" data-column="3" /></th>
                        <th><input type="text" class="form-control form-control-sm" placeholder="Cari" data-column="4" /></th>
                        <th class="col-actions"></th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            </div>
        </div>
    </div>

        <!-- Modal for Create/Edit/Delete -->
    <div class="modal fade" id="crudModal" tabindex="-1" aria-labelledby="crudModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content" id="modalContent">
                <!-- Content will be loaded here dynamically via AJAX -->
            </div>
        </div>
    </div>
    </div>

{% endblock %}
{% block scripts %}
<script>
    (function () {
        const ajaxUrl = "{% url 'nama_tabel_data' %}";
        let table;

        $(document).ready(function () {
            table = $('#nama-tabel-table').DataTable({
                serverSide: true,
                processing: true,
                layout: {
                    topStart: null,
                    topEnd: null
                },
                ajax: {
                    url: ajaxUrl,
                    dataSrc: 'data',
                    data: function (d) {
                        // Add column search values
                        d.columns_search = [];
                        $('#column-search-row input').each(function (i) {
                            d.columns_search[i] = $(this).val();
                        });
                        return d;
                    }
                },
                pageLength: 10,
                columns: [
                    { data: 'id_sub_jenis_data' },
                    { data: 'nama_jenis_data' },
                    { data: 'nama_sub_jenis_data' },
                    { data: 'nama_tabel_I' },
                    { data: 'nama_tabel_U' },
                    { data: 'actions', orderable: false, searchable: false }
                ],
                columnDefs: [
                    { targets: 5, className: "col-actions text-center", width: "90px", render: function (data, type, row, meta) { return '<div class="d-flex justify-content-center gap-1">' + data + '</div>'; } }
                ],
                order: [[0, 'asc']]
            });

            // Add individual column search
            $('#column-search-row input').on('keyup change', function () {
                table.ajax.reload();
            });

            // Handle modal hide to prevent aria-hidden conflicts
            const modalElement = document.getElementById('crudModal');
            modalElement.addEventListener('hidden.bs.modal', function () {
                // Reset modal body
                document.getElementById('modalBody').innerHTML = '';
            });

            modalElement.addEventListener('hide.bs.modal', function () {
                // Clear focus from form elements
                const focusedElement = document.activeElement;
                if (focusedElement && modalElement.contains(focusedElement)) {
                    focusedElement.blur();
                }
            });

            // Handle create button
            $('[data-action="create"]').on('click', function () {
                loadModal('{% url "nama_tabel_create" %}', 'Tambah Nama Tabel');
            });

            // Handle edit/delete buttons (delegated event)
            $(document).on('click', '[data-action="edit"]', function (e) {
                e.preventDefault();
                const url = $(this).data('url');
                loadModal(url, 'Edit Nama Tabel');
            });

            $(document).on('click', '[data-action="delete"]', function (e) {
                e.preventDefault();
                const url = $(this).data('url');
                loadModal(url, 'Hapus Nama Tabel');
            });

            // Handle form submission
            $(document).on('submit', '#crudModal form', function (e) {
                e.preventDefault();
                const form = $(this);
                const url = form.attr('action');
                const formData = new FormData(form[0]);

                $.ajax({
                    url: url,
                    type: 'POST',
                    data: formData,
                    processData: false,
                    contentType: false,
                    success: function (response) {
                        if (response.success) {
                            $('#crudModal').modal('hide');
                            table.ajax.reload();
                            showToast(response.message || 'Data berhasil disimpan.', 'success');
                        } else {
                            $('#modalContent').html(response.html || response);
                        }
                    },
                    error: function (xhr) {
                        try {
                            const response = JSON.parse(xhr.responseText);
                            if (response.message) {
                                showToast(response.message, 'danger');
                            } else {
                                showToast('Terjadi kesalahan. Silakan coba lagi.', 'danger');
                            }
                        } catch (e) {
                            showToast('Terjadi kesalahan. Silakan coba lagi.', 'danger');
                        }
                    }
                });
            });
        });

                function loadModal(url, title) {
            var dialog = $('#crudModal .modal-dialog');
            dialog.removeClass('modal-sm modal-lg modal-xl modal-adjustable').addClass('modal-lg');
            
            $('#modalContent').html(`
                <div class="modal-header">
                    <h5 class="modal-title" id="crudModalLabel">${title}</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center py-4">
                    <div class="spinner-border text-primary" role="status"></div>
                </div>
            `);
            $('#crudModal').modal('show');

            $.ajax({
                url: url,
                type: 'GET',
                data: { ajax: '1' },
                success: function (response) {
                    var htmlContent = response.html || response;
                    
                    // Gracefully redirect to login if session has expired
                    if (typeof htmlContent === 'string' && htmlContent.indexOf('Login') !== -1 && htmlContent.indexOf('password') !== -1) {
                        window.location.href = '/accounts/login/?next=' + window.location.pathname;
                        return;
                    }
                    
                    $('#modalContent').html(htmlContent);
                    $('#crudModalLabel').text(title);
                    
                    var modalSize = $('#modalContent form').data('modal-size') || 'lg';
                    dialog.removeClass('modal-sm modal-lg modal-xl modal-adjustable');
                    if (modalSize === 'sm') dialog.addClass('modal-sm');
                    else if (modalSize === 'lg') dialog.addClass('modal-lg');
                    else if (modalSize === 'xl') dialog.addClass('modal-xl');
                    else if (modalSize === 'adjustable') dialog.addClass('modal-adjustable');
                },
                error: function () {
                    $('#modalContent').html(`
                        <div class="modal-header">
                            <h5 class="modal-title">${title}</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            <div class="alert alert-danger mb-0">Gagal memuat form.</div>
                        </div>
                    `);
                }
            });
        }

    })();
</script>
{% endblock %}
