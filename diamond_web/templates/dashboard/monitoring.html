{% extends "base.html" %}

{% block title %}Monitoring Dashboard{% endblock %}

{% block content %}
<div class="page-header">
    <div class="page-header-left d-flex align-items-center">
        <div class="page-header-title">
            <h5 class="m-b-10">
                <i class="feather-bar-chart-2 me-2"></i>Monitoring Dashboard
            </h5>
        </div>
        <ul class="breadcrumb">
            <li class="breadcrumb-item"><a href="{% url 'home' %}">Home</a></li>
            <li class="breadcrumb-item active">Monitoring Dashboard</li>
        </ul>
    </div>
    <div class="page-header-right ms-auto">
        <div class="page-header-right-items">
            <div class="d-flex d-md-none">
                <a href="javascript:void(0)" class="page-header-right-close-toggle">
                    <i class="feather-arrow-left me-2"></i>
                    <span>Kembali</span>
                </a>
            </div>
        </div>
        <div class="d-md-none d-flex align-items-center">
            <a href="javascript:void(0)" class="page-header-right-open-toggle">
                <i class="feather-align-right fs-20"></i>
            </a>
        </div>
    </div>
</div>

<div class="main-content">
    <!-- Monitoring Card -->
    <div class="card stretch stretch-full h-100">
        <div class="card-header">
            <h5 class="card-title mb-0">
                <i class="feather-bar-chart-2 me-2"></i>DDE - Monitoring Tiket
            </h5>
        </div>
        <div class="card-body p-0">
            <iframe 
                title="DDE - Mon Tiket New" 
                width="100%" 
                height="800" 
                src="{{ powerbi_url }}" 
                frameborder="0" 
                allowfullscreen>
            </iframe>
        </div>
    </div>
</div>

<style>
    iframe {
        border: none;
        display: block;
    }
</style>
{% endblock %}
