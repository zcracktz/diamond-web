{% load crispy_forms_tags %}
<form method="post" action="{{ form_action }}">
    {% csrf_token %}
    <div class="modal-body">
        {% if form.non_field_errors %}
            <div class="alert alert-danger mb-3">
                {% for error in form.non_field_errors %}
                    <p class="mb-0">{{ error }}</p>
                {% endfor %}
            </div>
        {% endif %}
        {{ form|crispy }}
        
        <!-- Integrated Ticket Info Block -->
        <div id="div_id_tiket_info" class="mt-3 p-3 rounded" style="display: none; background-color: #f8fafc; border: 1px solid #e2e8f0;">
            <h6 class="fw-bold text-dark mb-2" style="font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;"><i class="feather-info me-1 text-primary"></i>Detail Informasi Tiket</h6>
            <div class="row g-3" style="font-size: 12.5px;">
                <div class="col-6">
                    <span class="text-muted d-block mb-1" style="font-size: 11px;">Nama ILAP</span>
                    <span id="lbl-tiket-ilap" class="fw-semibold text-dark">-</span>
                </div>
                <div class="col-6">
                    <span class="text-muted d-block mb-1" style="font-size: 11px;">Jenis Data</span>
                    <span id="lbl-tiket-jenis" class="fw-semibold text-dark">-</span>
                </div>
                <div class="col-6">
                    <span class="text-muted d-block mb-1" style="font-size: 11px;">Periode Data</span>
                    <span id="lbl-tiket-periode" class="fw-semibold text-dark">-</span>
                </div>
                <div class="col-6">
                    <span class="text-muted d-block mb-1" style="font-size: 11px;">Jumlah Data Diterima</span>
                    <span id="lbl-tiket-jumlah" class="fw-semibold text-dark">-</span>
                </div>
            </div>
        </div>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
        <button type="submit" class="btn btn-success">
            <i class="ri-save-line me-1"></i>Simpan
        </button>
    </div>
</form>
